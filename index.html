<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="/favicon.ico" sizes="any" />
        <link rel="icon" href="/logo.svg" type="image/svg+xml" />
        <link rel="apple-touch-icon" href="/logo.svg" />
        <meta
            name="theme-color"
            content="#ffffff"
            media="(prefers-color-scheme: light)"
        />
        <meta
            name="theme-color"
            content="#030709"
            media="(prefers-color-scheme: dark)"
        />
        <script>
            ;(function () {
                try {
                    var stored = localStorage.getItem('fx64b-ui-theme')
                    var theme =
                        stored === 'light' || stored === 'dark' ? stored : null
                    if (!theme) {
                        theme = window.matchMedia(
                            '(prefers-color-scheme: dark)'
                        ).matches
                            ? 'dark'
                            : 'light'
                    }
                    document.documentElement.classList.add(theme)
                } catch (e) {}
            })()
        </script>
        <meta
            name="robots"
            content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
        />
        <meta name="author" content="Fx64b" />
        <!-- Per-page title, description, canonical, Open Graph and Twitter
             tags are injected at build/runtime by the Seo component. -->

            {

                    {

                        "jobTitle": "Software Engineer",

                        "nationality": "Swiss",
                        "knowsAbout": [
                            "React",

                            "TypeScript",
                            "Go",
                            "Web Development",

                        ],

                            "https://github.com/Fx64b",

                        ]
                    },
                    {
                        "@type": "WebSite",
                        "@id": "https://fx64b.dev/#website",
                        "url": "https://fx64b.dev",
                        "name": "Fx64b.dev",
                        "description": "Personal website of Fx64b where you can find information about my latest projects and blog posts.",
                        "publisher": { "@id": "https://fx64b.dev/#person" },

                    }
                ]

    </head>
